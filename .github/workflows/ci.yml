name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke-test:
    name: Smoke test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ['22']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Install seo-intel globally (from npm registry)
        run: npm install -g seo-intel@latest

      - name: seo-intel --version
        run: seo-intel --version

      - name: seo-intel --help
        run: seo-intel --help

      - name: seo-intel status (no license, soft fail)
        run: seo-intel status
        continue-on-error: true

      - name: seo-intel update (check only, soft fail)
        run: seo-intel update
        continue-on-error: true

      - name: Verify no froggo.pro leaks in shipped files
        shell: bash
        run: |
          ROOT="$(npm root -g)/seo-intel"
          FAIL=0
          for f in lib/gate.js lib/license.js lib/updater.js crawler/index.js; do
            if grep -q "froggo.pro" "$ROOT/$f" 2>/dev/null; then
              echo "❌ froggo.pro found in $f"
              FAIL=1
            else
              echo "✅ $f clean"
            fi
          done
          [ $FAIL -eq 0 ] || exit 1

      - name: Server starts without crashing (5s)
        shell: bash
        run: |
          ROOT="$(npm root -g)/seo-intel"
          cd "$ROOT"
          timeout 5 node cli.js serve 2>&1 | tee /tmp/serve.log || true
          if grep -qiE "ERR_MODULE|SyntaxError|Cannot find package|EADDRINUSE" /tmp/serve.log; then
            echo "❌ serve error:"
            cat /tmp/serve.log
            exit 1
          fi
          echo "✅ serve started cleanly"
        continue-on-error: true

      - name: Required files manifest check
        shell: bash
        run: |
          ROOT="$(npm root -g)/seo-intel"
          MISSING=0
          for f in \
            cli.js server.js scheduler.js seo-audit.js \
            lib/gate.js lib/license.js lib/oauth.js lib/updater.js \
            crawler/index.js crawler/stealth.js \
            db/db.js db/schema.sql \
            exports/competitive.js exports/suggestive.js exports/technical.js exports/templates.js \
            reports/generate-html.js \
            setup/wizard.html setup/web-routes.js \
            config/example.json \
            README.md CHANGELOG.md; do
            if [ ! -f "$ROOT/$f" ]; then
              echo "❌ Missing: $f"
              MISSING=$((MISSING+1))
            else
              echo "✅ $f"
            fi
          done
          [ $MISSING -eq 0 ] || exit 1
